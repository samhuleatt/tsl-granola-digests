name: TSL Daily Digest

on:
  schedule:
    - cron: '0 1 * * 2-6'   # 9pm ET during EDT
    - cron: '0 2 * * 2-6'   # 9pm ET during EST
  workflow_dispatch:          # allow manual trigger for testing

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Skip wrong DST slot
        if: github.event_name == 'schedule'
        run: |
          current_hour=$(TZ=America/New_York date +%H)
          if [ "$current_hour" != "21" ]; then
            echo "Not 9pm ET; skipping duplicate DST slot."
            exit 0
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node src/daily.js
        env:
          GRANOLA_API_KEY: ${{ secrets.GRANOLA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
