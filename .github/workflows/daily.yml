name: TSL Daily Digest

on:
  schedule:
    # Run at both possible UTC offsets for 9pm Eastern; src/daily.js sends only when ET hour is 21.
    - cron: '0 1,2 * * *'
  workflow_dispatch:          # allow manual trigger for testing

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node src/daily.js
        env:
          GRANOLA_API_KEY: ${{ secrets.GRANOLA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REQUIRE_DIGEST_HOUR: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
