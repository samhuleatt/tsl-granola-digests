name: Send Weekly Digest

on:
  push:
    paths:
      - "pending/weekly.json"

jobs:
  send:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send weekly digest
        run: node sendDigest.js weekly
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
