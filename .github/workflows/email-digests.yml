name: Email Digests

on:
  push:
    paths:
      - "pending/daily.json"
      - "pending/weekly.json"

jobs:
  send-daily:
    if: contains(toJSON(github.event.commits), 'pending/daily.json')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send daily digest
        run: node sendDigest.js daily
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

  send-weekly:
    if: contains(toJSON(github.event.commits), 'pending/weekly.json')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send weekly digest
        run: node sendDigest.js weekly
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
