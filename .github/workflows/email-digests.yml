name: Email Digests

on:
  push:
    paths:
      - "pending/daily.json"
      - "pending/weekly.json"

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Send digest email
        run: node sendDigest.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
