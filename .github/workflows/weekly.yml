name: TSL Weekly Digest

on:
  schedule:
    # 9am Eastern on Saturday. GitHub cron is UTC, so run both DST offsets;
    # src/weekly.js sends only when the Eastern weekday/hour matches.
    - cron: '0 13,14 * * 6'
  workflow_dispatch:
    inputs:
      send_email:
        description: 'Actually send the email instead of a dry run'
        required: false
        default: false
        type: boolean

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node src/weekly.js
        env:
          GRANOLA_API_KEY: ${{ secrets.GRANOLA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REQUIRE_DIGEST_WINDOW: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
          SEND_DIGEST_EMAIL: ${{ github.event_name == 'schedule' || inputs.send_email }}
